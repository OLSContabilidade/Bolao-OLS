<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bolão Copa do Mundo 2026 - OLS Contabilidade</title>
<style>
  :root {
    --navy: #0c2a4a;
    --navy-dark: #071a30;
    --gold: #d4af37;
    --gold-light: #f0d878;
    --bg: #f2f4f7;
    --card: #ffffff;
    --border: #e0e3e8;
    --text: #1d2939;
    --text-muted: #667085;
    --green: #1d9e75;
    --green-bg: #e1f5ee;
    --amber: #ba7517;
    --amber-bg: #faeeda;
    --red: #a32d2d;
    --red-bg: #fcebeb;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 760px; margin: 0 auto; padding: 16px; }

  .header {
    background: linear-gradient(135deg, var(--navy-dark) 0%, var(--navy) 100%);
    border-radius: 14px;
    padding: 18px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 18px;
    border: 1px solid var(--gold);
    flex-wrap: wrap;
  }
  .header img {
    height: 56px;
    width: auto;
    border-radius: 6px;
    background: #fff;
    padding: 4px;
    flex-shrink: 0;
  }
  .header .titles { flex: 1; min-width: 180px; }
  .header h1 {
    color: #fff;
    margin: 0;
    font-size: 19px;
    font-weight: 600;
  }
  .header p {
    color: var(--gold-light);
    margin: 4px 0 0;
    font-size: 12.5px;
  }
  .header .actions { display: flex; gap: 8px; flex-wrap: wrap; }

  button, .btn {
    font-family: inherit;
    cursor: pointer;
    border-radius: 8px;
    font-size: 13.5px;
    font-weight: 600;
    border: none;
    padding: 9px 16px;
    transition: filter 0.15s ease;
  }
  button:active, .btn:active { transform: scale(0.98); }
  button:disabled { opacity: 0.6; cursor: default; }
  .btn-primary { background: var(--gold); color: var(--navy-dark); width: 100%; padding: 13px 24px; font-size: 15px; }
  .btn-primary:hover { filter: brightness(1.05); }
  .btn-secondary { background: transparent; color: var(--gold-light); border: 1px solid var(--gold); }
  .btn-secondary:hover { background: rgba(212,175,55,0.12); }
  .btn-ghost { background: none; border: none; color: var(--navy); font-size: 13px; text-decoration: underline; padding: 4px; }
  .btn-tab {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
  }
  .btn-tab.active {
    background: var(--navy);
    color: #fff;
    border-color: var(--navy);
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
    margin-bottom: 14px;
  }

  .card h2 { font-size: 17px; font-weight: 600; margin: 0 0 8px; }
  .card p.desc { font-size: 13.5px; color: var(--text-muted); margin: 0 0 14px; line-height: 1.5; }

  input[type="text"], input[type="number"], input[type="password"] {
    font-family: inherit;
    border: 1.5px solid #cfd4dc;
    border-radius: 8px;
    padding: 0 12px;
    font-size: 15px;
    color: var(--text);
    background: #fff;
  }
  input[type="text"], input[type="password"] { width: 100%; height: 44px; box-sizing: border-box; margin-bottom: 12px; }
  input[type="text"]:focus, input[type="number"]:focus, input[type="password"]:focus {
    outline: none;
    border-color: var(--navy);
  }

  .score-input {
    width: 42px;
    height: 38px;
    text-align: center;
    font-size: 17px;
    font-weight: 600;
    border-radius: 6px;
    color: var(--navy-dark);
  }
  .score-input:disabled { background: #f0f0f0; color: #aaa; border-color: #ddd; }

  .error-msg { color: var(--red); font-size: 13px; margin: 0 0 12px; }
  .status-msg { font-size: 13px; text-align: center; margin-top: 10px; }
  .status-saved { color: var(--green); }
  .status-error, .status-incomplete { color: var(--red); }
  .status-saving { color: var(--text-muted); }

  .footer-note {
    text-align: center;
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 18px;
    line-height: 1.6;
    white-space: pre-line;
  }

  .group-tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 14px;
  }

  .match-row {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }
  .match-meta { flex: 1; min-width: 140px; }
  .match-meta .group-tag {
    font-size: 11px;
    color: var(--gold);
    background: var(--navy);
    display: inline-block;
    padding: 1px 7px;
    border-radius: 4px;
    font-weight: 700;
    margin-bottom: 3px;
  }
  .match-meta .when {
    font-size: 11px;
    color: var(--text-muted);
  }
  .match-teams {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .team-name {
    font-size: 13.5px;
    font-weight: 600;
    min-width: 90px;
  }
  .team-name.home { text-align: right; }
  .vs { font-size: 12px; color: var(--text-muted); }

  .rank-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 22px; height: 22px;
    border-radius: 50%;
    font-size: 11px;
    font-weight: 700;
    margin-right: 6px;
    flex-shrink: 0;
  }
  .rank-1 { background: var(--gold); color: var(--navy-dark); }
  .rank-2 { background: #d8d8d8; color: #444; }
  .rank-3 { background: #e3b27a; color: #5a3a1a; }
  .rank-other { background: var(--bg); color: var(--text-muted); }

  .pts-badge {
    background: var(--green-bg);
    color: var(--green);
    font-weight: 700;
    border-radius: 6px;
    padding: 2px 8px;
    font-size: 12px;
    flex-shrink: 0;
  }

  .legend {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    font-size: 11.5px;
    color: var(--text-muted);
    margin-top: 10px;
  }
  .legend span { display: inline-flex; align-items: center; gap: 4px; }
  .dot { width: 10px; height: 10px; border-radius: 3px; display: inline-block; }
  .dot-3 { background: var(--green); }
  .dot-1 { background: var(--amber); }
  .dot-0 { background: var(--red); }

  .empty-state {
    text-align: center;
    color: var(--text-muted);
    font-size: 14px;
    padding: 24px;
  }

  .info-box {
    background: var(--green-bg);
    border: 1px solid #b9e3d3;
    color: #0f6e56;
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 12.5px;
    margin-bottom: 14px;
    line-height: 1.5;
  }
  .warn-box {
    background: var(--amber-bg);
    border: 1px solid #f0c98a;
    color: var(--amber);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 12.5px;
    margin-bottom: 14px;
    line-height: 1.5;
  }

  .group-section-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--navy);
    margin: 18px 0 8px;
    padding-bottom: 4px;
    border-bottom: 2px solid var(--gold);
  }
  .group-section-title:first-child { margin-top: 0; }

  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid var(--gold);
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .conn-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 5px;
  }
  .conn-online { background: var(--green); }
  .conn-offline { background: var(--red); }

  table.picks-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 11.5px;
    min-width: 640px;
  }
  table.picks-table th, table.picks-table td {
    padding: 6px 5px;
    text-align: center;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  table.picks-table th {
    background: var(--navy);
    color: var(--gold-light);
    font-weight: 600;
    position: sticky;
    top: 0;
  }
  table.picks-table th:first-child, table.picks-table td:first-child {
    text-align: left;
    font-weight: 600;
    position: sticky;
    left: 0;
    background: var(--card);
    z-index: 1;
    color: var(--text);
  }
  table.picks-table th:first-child { background: var(--navy); color: #fff; z-index: 2; }
  table.picks-table tr:nth-child(even) td:not(:first-child) { background: #f7f8fa; }
  .picks-table-wrap {
    overflow: auto;
    max-height: 70vh;
    border: 1px solid var(--border);
    border-radius: 10px;
  }
  .pt-cell-3 { color: var(--green); font-weight: 700; }
  .pt-cell-1 { color: var(--amber); font-weight: 700; }
  .pt-cell-0 { color: var(--red); }
  .pt-cell-pending { color: var(--text-muted); }
</style>
</head>

/* ==================== HELPERS ==================== */
function el(tag, attrs, children) {
  const e = document.createElement(tag);
  if (attrs) {
    for (const k in attrs) {
      if (k === "style" && typeof attrs[k] === "object") {
        Object.assign(e.style, attrs[k]);
      } else if (k.startsWith("on") && typeof attrs[k] === "function") {
        e.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
      } else if (k === "class") {
        e.className = attrs[k];
      } else if (k === "html") {
        e.innerHTML = attrs[k];
      } else if (attrs[k] !== false && attrs[k] !== null && attrs[k] !== undefined) {
        e.setAttribute(k, attrs[k]);
      }
    }
  }
  if (children) {
    (Array.isArray(children) ? children : [children]).forEach(c => {
      if (c === null || c === undefined || c === false) return;
      if (typeof c === "string" || typeof c === "number") {
        e.appendChild(document.createTextNode(c));
      } else {
        e.appendChild(c);
      }
    });
  }
  return e;
}

function userKeyFromName(name) {
  return name.trim().toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
    .replace(/\s+/g, "_")
    .replace(/[^a-z0-9_]/g, "");
}

function groupedMatches() {
  const byGroup = {};
  MATCHES.forEach(m => {
    if (!byGroup[m.group]) byGroup[m.group] = [];
    byGroup[m.group].push(m);
  });
  return byGroup;
}

/* ==================== PONTUACAO ==================== */
function calcPoints(pick, result) {
  if (!pick || pick.home === "" || pick.away === "" || pick.home === undefined || pick.away === undefined) return null;
  if (!result || result.home === "" || result.away === "" || result.home === undefined || result.away === undefined) return null;
  const ph = parseInt(pick.home, 10);
  const pa = parseInt(pick.away, 10);
  const rh = parseInt(result.home, 10);
  const ra = parseInt(result.away, 10);
  if (isNaN(ph) || isNaN(pa) || isNaN(rh) || isNaN(ra)) return null;
  if (ph === rh && pa === ra) return 3;
  const pickResult = ph > pa ? "H" : (ph < pa ? "A" : "D");
  const realResult = rh > ra ? "H" : (rh < ra ? "A" : "D");
  return pickResult === realResult ? 1 : 0;
}

function computeUserTotal(picks, results) {
  let total = 0;
  let played = 0;
  MATCHES.forEach(m => {
    const pts = calcPoints(picks ? picks[m.id] : null, results[m.id]);
    if (pts !== null) {
      total += pts;
      played++;
    }
  });
  return { total, played };
}

  input.addEventListener("input", e => { state.loginName = e.target.value; });
  input.addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });
  card.appendChild(input);

  if (state.loginError) card.appendChild(el("p", { class: "error-msg" }, state.loginError));

  card.appendChild(makeBtn("Entrar", "btn-primary", doLogin));

  const linksRow = el("div", { style: { marginTop: "14px", textAlign: "center", display: "flex", flexDirection: "column", gap: "8px" } });
  linksRow.appendChild(makeBtn("Ver classificação geral do bolão", "btn-ghost", () => { state.screen = "ranking"; render(); }));
  linksRow.appendChild(makeBtn("Ver tabela de jogos e resultados", "btn-ghost", () => { state.screen = "tabela"; render(); }));
  linksRow.appendChild(makeBtn("Área do administrador (lançar resultados)", "btn-ghost", () => { state.screen = "adminLogin"; render(); }));
  card.appendChild(linksRow);

  root.appendChild(card);

  root.appendChild(el("p", { class: "footer-note" },
    "Fase de grupos completa • 72 jogos • 12 grupos (A-L) • Copa do Mundo FIFA 2026\n" +
    "Pontuação: 3 pts (placar exato) • 1 pt (acertou o resultado) • 0 pt (errou)"
  ));

  return root;
}

function doLogin() {
  state.loginError = "";
  const name = state.loginName.trim();
  if (!name) { state.loginError = "Digite seu nome."; render(); return; }
  const key = userKeyFromName(name);
  if (!key) { state.loginError = "Nome inválido."; render(); return; }

  state.saveStatus = "loading-login";
  render();

  db.ref("users/" + key).once("value").then(snap => {
    if (!snap.exists()) {
      return db.ref("users/" + key).set({ name: name, createdAt: Date.now() });
    }
  }).then(() => {
    return db.ref("picks/" + key).once("value");
  }).then(snap => {
    state.currentUser = { key, name };
    state.picks = snap.val() || {};
    localStorage.setItem(LS_USER_KEY, key);
    state.screen = "palpites";
    state.activeGroup = "ALL";
    state.saveStatus = "";
    render();
  }).catch(err => {
    state.loginError = "Erro de conexão: " + err.message;
    state.saveStatus = "";
    render();
  });
}

function logout() {
  state.currentUser = null;
  state.loginName = "";
  state.picks = {};
  state.saveStatus = "";
  localStorage.removeItem(LS_USER_KEY);
  state.screen = "login";
  render();
}

function renderMatchRow(m, opts) {
  opts = opts || {};
  const homeVal = state.picks[m.id]?.home ?? "";
  const awayVal = state.picks[m.id]?.away ?? "";
  const result = state.results[m.id];
  const locked = !!(result && result.home !== "" && result.away !== "" && result.home !== undefined && result.away !== undefined);

  const metaChildren = [
    el("span", { class: "group-tag" }, "Grupo " + m.group + " • Rodada " + m.round),
    el("br"),
    (m.date ? el("span", { class: "when" }, m.date + " • " + m.time + " (Brasília) • " + m.local) : el("span", { class: "when" }, "Data a confirmar")),
  ];
  if (locked) {
    metaChildren.push(el("br"));
    metaChildren.push(el("span", { class: "when", style: { color: "var(--red)", fontWeight: "600" } }, "🔒 Encerrado • Resultado: " + result.home + "-" + result.away));
  }
  const meta = el("div", { class: "match-meta" }, metaChildren);

  const homeInput = el("input", { type: "number", min: "0", max: "20", class: "score-input", value: homeVal, disabled: locked });
  if (!locked) homeInput.addEventListener("input", e => updatePick(m.id, "home", e.target.value));
  const awayInput = el("input", { type: "number", min: "0", max: "20", class: "score-input", value: awayVal, disabled: locked });
  if (!locked) awayInput.addEventListener("input", e => updatePick(m.id, "away", e.target.value));

  const teams = el("div", { class: "match-teams" }, [
    el("span", { class: "team-name home" }, m.home),
    homeInput,
    el("span", { class: "vs" }, "x"),
    awayInput,
    el("span", { class: "team-name" }, m.away),
  ]);

  return el("div", { class: "match-row", style: locked ? { opacity: "0.7", background: "#f7f8fa" } : {} }, [meta, teams]);
}

function updatePick(matchId, side, rawVal) {
  let v = rawVal;
  if (v !== "") {
    v = Math.max(0, Math.min(20, parseInt(v, 10) || 0));
    v = String(v);
  }
  if (!state.picks[matchId]) state.picks[matchId] = { home: "", away: "" };
  state.picks[matchId][side] = v;
  state.saveStatus = "";
}

function savePicksHandler() {
  if (!state.currentUser) return;
  const incomplete = MATCHES.some(m => {
    const p = state.picks[m.id];
    return !p || p.home === "" || p.away === "";
  });

  // sanitize: remove empty entries from object before saving (firebase doesn't like undefined)
  const toSave = {};
  MATCHES.forEach(m => {
    const p = state.picks[m.id];
    if (p && p.home !== "" && p.away !== "") {
      toSave[m.id] = { home: p.home, away: p.away };
    }
  });

  state.saveStatus = "saving";
  render();

  db.ref("picks/" + state.currentUser.key).set(toSave).then(() => {
    state.saveStatus = incomplete ? "incomplete" : "saved";
    render();
  }).catch(() => {
    state.saveStatus = "error";
    render();
  });
}

  if (userKeys.length === 0) {

  } else {
    const rows = userKeys.map(key => {
      const picks = state.allPicks[key] || {};
      const { total, played } = computeUserTotal(picks, state.results);
      return { key, name: state.users[key].name, total, played };
    });
    rows.sort((a, b) => b.total - a.total || b.played - a.played || a.name.localeCompare(b.name));

    rows.forEach((r, idx) => {
      const rankClass = idx === 0 ? "rank-1" : idx === 1 ? "rank-2" : idx === 2 ? "rank-3" : "rank-other";
      const isCurrent = state.currentUser && state.currentUser.key === r.key;
      const row = el("div", {
        class: "match-row",
        style: { justifyContent: "space-between", borderColor: isCurrent ? "var(--gold)" : "var(--border)", borderWidth: isCurrent ? "1.5px" : "1px" }
      }, [
        el("div", { style: { display: "flex", alignItems: "center", minWidth: 0 } }, [
          el("span", { class: "rank-badge " + rankClass }, String(idx + 1)),
          el("span", { style: { fontWeight: "600", fontSize: "14px", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" } }, r.name + (isCurrent ? " (você)" : "")),
        ]),
        el("div", { style: { display: "flex", alignItems: "center", gap: "10px", flexShrink: 0 } }, [
          el("span", { style: { fontSize: "12px", color: "var(--text-muted)" } }, r.played + "/" + MATCHES.length + " apurados"),
          el("span", { class: "pts-badge" }, r.total + " pts"),
        ]),
      ]);
      card.appendChild(row);
    });

    card.appendChild(el("div", { class: "legend" }, [
      el("span", null, [el("span", { class: "dot dot-3" }), " 3 pts: placar exato"]),
      el("span", null, [el("span", { class: "dot dot-1" }), " 1 pt: acertou o resultado"]),
      el("span", null, [el("span", { class: "dot dot-0" }), " 0 pt: errou"]),
    ]));
  }

  root.appendChild(card);
  return root;
}

  const actions = [];
  if (state.currentUser) {
    actions.push(makeBtn("Meus palpites", "btn-secondary", () => { state.screen = "palpites"; render(); }));
  } else {
    actions.push(makeBtn("Entrar", "btn-secondary", () => { state.screen = "login"; render(); }));
  }
  actions.push(makeBtn("Classificação", "btn-secondary", () => { state.screen = "ranking"; render(); }));

  root.appendChild(renderHeader({
    title: "Tabela de jogos e resultados",
    subtitle: "Fase de grupos - Copa do Mundo 2026",
    actions,
  }));
  root.appendChild(connBadge());

  const card = el("div", { class: "card" });

  const tabs = el("div", { class: "group-tabs" });
  tabs.appendChild(makeBtn("Todos", "btn-tab" + (state.activeGroup === "ALL" ? " active" : ""), () => { state.activeGroup = "ALL"; render(); }));
  Object.keys(GROUPS).forEach(g => {
    tabs.appendChild(makeBtn("Grupo " + g, "btn-tab" + (state.activeGroup === g ? " active" : ""), () => { state.activeGroup = g; render(); }));
  });
  card.appendChild(tabs);

  const byGroup = groupedMatches();
  const groupsToShow = state.activeGroup === "ALL" ? Object.keys(GROUPS) : [state.activeGroup];

  groupsToShow.forEach(g => {
    card.appendChild(el("div", { class: "group-section-title" }, "Grupo " + g + " — " + GROUPS[g].join(", ")));
    byGroup[g].forEach(m => {
      const r = state.results[m.id];
      const hasResult = r && r.home !== "" && r.away !== "" && r.home !== undefined && r.away !== undefined;
      const meta = el("div", { class: "match-meta" }, [
        el("span", { class: "group-tag" }, "Rodada " + m.round),
        el("br"),
        (m.date ? el("span", { class: "when" }, m.date + " • " + m.time + " • " + m.local) : el("span", { class: "when" }, "Data a confirmar")),
      ]);
      const scoreDisplay = hasResult
        ? el("span", { style: { fontWeight: "700", fontSize: "16px", color: "var(--navy)" } }, r.home + " - " + r.away)
        : el("span", { style: { fontSize: "13px", color: "var(--text-muted)" } }, "vs");
      const teams = el("div", { class: "match-teams" }, [
        el("span", { class: "team-name home" }, m.home),
        scoreDisplay,
        el("span", { class: "team-name" }, m.away),
      ]);
      card.appendChild(el("div", { class: "match-row" }, [meta, teams]));
    });
  });

  root.appendChild(card);
  return root;
}

/* ==================== TELA: ADMIN LOGIN ==================== */
function renderAdminLogin() {
  const root = el("div");
  root.appendChild(renderHeader({
    title: "Área do administrador",
    subtitle: "Lançamento de resultados oficiais",
    actions: [makeBtn("Voltar", "btn-secondary", () => { state.screen = "login"; render(); })],
  }));

  const card = el("div", { class: "card" });
  card.appendChild(el("h2", null, "Senha de administrador"));
  card.appendChild(el("p", { class: "desc" },
    "Apenas o responsável pelo bolão deve lançar os resultados oficiais dos jogos. Digite a senha de administrador."));

  const input = el("input", { type: "password", placeholder: "Senha" });
  input.addEventListener("input", e => { state.adminPassword = e.target.value; });
  input.addEventListener("keydown", e => { if (e.key === "Enter") doAdminLogin(); });
  card.appendChild(input);

  if (state.adminError) card.appendChild(el("p", { class: "error-msg" }, state.adminError));

  card.appendChild(makeBtn("Entrar", "btn-primary", doAdminLogin));
  root.appendChild(card);
  return root;
}

function doAdminLogin() {
  if (state.adminPassword === ADMIN_PASS) {
    state.isAdmin = true;
    state.adminError = "";
    state.screen = "admin";
    state.activeGroup = "ALL";
  } else {
    state.adminError = "Senha incorreta.";
  }
  render();
}

/* ==================== TELA: ADMIN ==================== */
let pendingResults = {};

function renderAdmin() {
  const root = el("div");
  root.appendChild(renderHeader({
    title: "Lançar resultados oficiais",
    subtitle: "Os pontos do bolão são calculados automaticamente",
    actions: [
      makeBtn("Ver palpites de todos", "btn-secondary", () => { state.screen = "adminPicks"; render(); }),
      makeBtn("Classificação", "btn-secondary", () => { state.screen = "ranking"; render(); }),
      makeBtn("Sair do admin", "btn-secondary", () => { state.isAdmin = false; pendingResults = {}; state.screen = "login"; render(); }),
    ],
  }));
  root.appendChild(connBadge());

  const card = el("div", { class: "card" });
  card.appendChild(el("div", { class: "info-box" },
    "Insira o placar oficial de cada jogo conforme os resultados forem saindo. A classificação do bolão é recalculada automaticamente, em tempo real, para todos os colaboradores."));

  const tabs = el("div", { class: "group-tabs" });
  tabs.appendChild(makeBtn("Todos", "btn-tab" + (state.activeGroup === "ALL" ? " active" : ""), () => { state.activeGroup = "ALL"; render(); }));
  Object.keys(GROUPS).forEach(g => {
    tabs.appendChild(makeBtn("Grupo " + g, "btn-tab" + (state.activeGroup === g ? " active" : ""), () => { state.activeGroup = g; render(); }));
  });
  card.appendChild(tabs);

  const byGroup = groupedMatches();
  const groupsToShow = state.activeGroup === "ALL" ? Object.keys(GROUPS) : [state.activeGroup];

  groupsToShow.forEach(g => {
    card.appendChild(el("div", { class: "group-section-title" }, "Grupo " + g + " — " + GROUPS[g].join(", ")));
    byGroup[g].forEach(m => {
      const current = (pendingResults[m.id] !== undefined) ? pendingResults[m.id] : (state.results[m.id] || { home: "", away: "" });
      const meta = el("div", { class: "match-meta" }, [
        el("span", { class: "group-tag" }, "Rodada " + m.round),
        el("br"),
        (m.date ? el("span", { class: "when" }, m.date + " • " + m.time) : el("span", { class: "when" }, "Data a confirmar")),
      ]);
      const homeInput = el("input", { type: "number", min: "0", max: "20", class: "score-input", value: current.home ?? "" });
      homeInput.addEventListener("input", e => updateResult(m.id, "home", e.target.value));
      const awayInput = el("input", { type: "number", min: "0", max: "20", class: "score-input", value: current.away ?? "" });
      awayInput.addEventListener("input", e => updateResult(m.id, "away", e.target.value));
      const teams = el("div", { class: "match-teams" }, [
        el("span", { class: "team-name home" }, m.home),
        homeInput,
        el("span", { class: "vs" }, "x"),
        awayInput,
        el("span", { class: "team-name" }, m.away),
      ]);
      card.appendChild(el("div", { class: "match-row" }, [meta, teams]));
    });
  });

  card.appendChild(makeBtn("Salvar resultados", "btn-primary", saveResultsHandler, state.saveStatus === "saving-results"));

  if (state.saveStatus === "saving-results") {
    card.appendChild(el("p", { class: "status-msg status-saving" }, [el("span", { class: "spinner" }), "Salvando..."]));
  } else if (state.saveStatus === "saved-results") {
    card.appendChild(el("p", { class: "status-msg status-saved" }, "Resultados salvos! Classificação atualizada para todos."));
  } else if (state.saveStatus === "error") {
    card.appendChild(el("p", { class: "status-msg status-error" }, "Erro ao salvar. Verifique sua conexão e tente novamente."));
  }

  root.appendChild(card);
  return root;
}

function updateResult(matchId, side, rawVal) {
  let v = rawVal;
  if (v !== "") {
    v = Math.max(0, Math.min(99, parseInt(v, 10) || 0));
    v = String(v);
  }
  const base = pendingResults[matchId] || state.results[matchId] || { home: "", away: "" };
  pendingResults[matchId] = { home: base.home ?? "", away: base.away ?? "" };
  pendingResults[matchId][side] = v;
  state.saveStatus = "";
}

function saveResultsHandler() {
  // merge pending into a sanitized full results object
  const merged = Object.assign({}, state.results);
  Object.keys(pendingResults).forEach(id => {
    const r = pendingResults[id];
    if (r.home !== "" && r.away !== "") {
      merged[id] = { home: r.home, away: r.away };
    } else {
      delete merged[id];
    }
  });

  state.saveStatus = "saving-results";
  render();

  db.ref("results").set(merged).then(() => {
    pendingResults = {};
    state.saveStatus = "saved-results";
    render();
  }).catch(() => {
    state.saveStatus = "error";
    render();
  });
}

/* ==================== TELA: ADMIN - PALPITES DE TODOS ==================== */
function renderAdminPicks() {
  const root = el("div");
  root.appendChild(renderHeader({
    title: "Palpites de todos os colaboradores",
    subtitle: "Visão completa - " + MATCHES.length + " jogos x " + Object.keys(state.users).length + " participante(s)",
    actions: [
      makeBtn("Lançar resultados", "btn-secondary", () => { state.screen = "admin"; render(); }),
      makeBtn("Classificação", "btn-secondary", () => { state.screen = "ranking"; render(); }),
      makeBtn("Sair do admin", "btn-secondary", () => { state.isAdmin = false; pendingResults = {}; state.screen = "login"; render(); }),
    ],
  }));
  root.appendChild(connBadge());

  const card = el("div", { class: "card" });

  const userKeys = Object.keys(state.users);
  if (userKeys.length === 0) {
    card.appendChild(el("p", { class: "empty-state" }, "Ainda não há colaboradores cadastrados."));
    root.appendChild(card);
    return root;
  }

  card.appendChild(el("div", { class: "info-box" },
    "Cada célula mostra o palpite do colaborador (placar mandante-visitante). A cor indica a pontuação obtida após o resultado oficial ser lançado: verde = 3 pts (placar exato), laranja = 1 pt (acertou o resultado), vermelho = 0 pt (errou)."));

  const tabs = el("div", { class: "group-tabs" });
  tabs.appendChild(makeBtn("Todos", "btn-tab" + (state.activeGroup === "ALL" ? " active" : ""), () => { state.activeGroup = "ALL"; render(); }));
  Object.keys(GROUPS).forEach(g => {
    tabs.appendChild(makeBtn("Grupo " + g, "btn-tab" + (state.activeGroup === g ? " active" : ""), () => { state.activeGroup = g; render(); }));
  });
  card.appendChild(tabs);

  const matchesToShow = state.activeGroup === "ALL" ? MATCHES : MATCHES.filter(m => m.group === state.activeGroup);

  // sort users by name for stable column order
  const userRows = userKeys
    .map(key => ({ key, name: state.users[key].name }))
    .sort((a, b) => a.name.localeCompare(b.name));

  const wrap = el("div", { class: "picks-table-wrap" });
  const table = el("table", { class: "picks-table" });

  const thead = el("thead");
  const headRow = el("tr");
  headRow.appendChild(el("th", null, "Jogo"));
  userRows.forEach(u => headRow.appendChild(el("th", null, u.name)));
  thead.appendChild(headRow);
  table.appendChild(thead);

  const tbody = el("tbody");
  matchesToShow.forEach(m => {
    const result = state.results[m.id];
    const row = el("tr");
    const labelHome = m.home.length > 12 ? m.home.slice(0, 3).toUpperCase() : m.home;
    const labelAway = m.away.length > 12 ? m.away.slice(0, 3).toUpperCase() : m.away;
    const resultStr = (result && result.home !== "" && result.home !== undefined)
      ? " (" + result.home + "-" + result.away + ")" : "";
    row.appendChild(el("td", { title: m.home + " x " + m.away }, "G" + m.group + " " + labelHome + "x" + labelAway + resultStr));

    userRows.forEach(u => {
      const pick = (state.allPicks[u.key] || {})[m.id];
      let cellText = "—";
      let cellClass = "";
      if (pick && pick.home !== "" && pick.away !== "") {
        cellText = pick.home + "-" + pick.away;
        const pts = calcPoints(pick, result);
        if (pts === 3) cellClass = "pt-cell-3";
        else if (pts === 1) cellClass = "pt-cell-1";
        else if (pts === 0) cellClass = "pt-cell-0";
        else cellClass = "pt-cell-pending";
      }
      row.appendChild(el("td", { class: cellClass }, cellText));
    });
    tbody.appendChild(row);
  });
  table.appendChild(tbody);
  wrap.appendChild(table);
  card.appendChild(wrap);

  card.appendChild(el("div", { class: "legend" }, [
    el("span", null, [el("span", { class: "dot dot-3" }), " 3 pts: placar exato"]),
    el("span", null, [el("span", { class: "dot dot-1" }), " 1 pt: acertou o resultado"]),
    el("span", null, [el("span", { class: "dot dot-0" }), " 0 pt: errou"]),
    el("span", null, "— : sem palpite"),
  ]));

  root.appendChild(card);
  return root;
}

/* ==================== RENDER PRINCIPAL ==================== */
function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";
  let view;
  switch (state.screen) {
    case "login": view = renderLogin(); break;
    case "palpites": view = renderPalpites(); break;
    case "ranking": view = renderRanking(); break;
    case "tabela": view = renderTabela(); break;
    case "adminLogin": view = renderAdminLogin(); break;
    case "admin": view = renderAdmin(); break;
    case "adminPicks": view = renderAdminPicks(); break;
    default: view = renderLogin();
  }
  app.appendChild(view);
}

/* ==================== INIT ==================== */
(function init() {
  const savedKey = localStorage.getItem(LS_USER_KEY);
  render(); // tela inicial enquanto carrega

  if (savedKey) {
    db.ref("users/" + savedKey).once("value").then(snap => {
      if (snap.exists()) {
        state.currentUser = { key: savedKey, name: snap.val().name };
        return db.ref("picks/" + savedKey).once("value").then(psnap => {
          state.picks = psnap.val() || {};
          state.screen = "palpites";
          render();
        });
      } else {
        render();
      }
    }).catch(() => render());
  }
})();
</script>
